# forge-context-engine — Engine Configuration
# Not a narrative context file. Customize during Context Initialization for the target repo.

forge_version: "0.2.1"   # framework version
tier: standard  # minimal | standard | advanced

# Remove layers not relevant to the target repo.
layers_enabled:
  - backend
  - frontend
  - mobile
  - infrastructure
  - testing

# Populated during init. Format: { name: <unit>, type: service|app|worker|library|infra-module|platform-component }
systems: []

loading:
  default_mode: implementation  # planning | implementation | execute | testing | review
  respect_size_budget: true

size_budget:
  core_lines: 200
  layer_lines: 150
  system_lines: 200
  mode_lines: 40

governance:
  staleness_days: 90
  require_evidence_for: [confirmed, inferred]
  demote_confirmed_on_evidence_change: true
